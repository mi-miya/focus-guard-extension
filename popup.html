<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <title>Focus Guard</title>
</head>
<body class="popup">
  <main class="card compact">
    <p class="label">Focus Guard</p>
    <h1 id="statusTitle">読み込み中...</h1>
    <p id="statusText" class="muted"></p>
    <div class="pauseRow" aria-label="一時解除">
      <button id="pause5Button" type="button" class="secondary">5分だけ解除</button>
      <button id="pause60Button" type="button" class="secondary">1時間だけ解除</button>
    </div>
    <button id="optionsButton" type="button" class="secondary">ブロック対象を編集</button>
    <button id="toggleButton" type="button">切り替え</button>
  </main>
  <script src="popup.js"></script>
</body>
</html>
